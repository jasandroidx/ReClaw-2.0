<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReClaw Pixel Sim — RPG Ops Floor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body {
            background: #0c0a1f; color: #22ff66; font-family: 'Press Start 2P', monospace;
            margin: 0; padding: 16px; image-rendering: pixelated; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: #bb99ff; text-shadow: 0 0 12px #663399; font-size: 14px; margin: 0 0 12px; text-transform: uppercase; }
        #controls { margin-bottom: 12px; display: flex; gap: 12px; }
        button {
            background: #1a1814; border: 3px solid #663399; color: #ffee77; padding: 8px 16px;
            font-family: 'Press Start 2P', monospace; font-size: 10px; cursor: pointer;
            box-shadow: 0 0 12px #ffaa33;
        }
        button:hover { background: #663399; color: #0c0a1f; }
        canvas {
            border: 6px double #332211; background: #1a140c; image-rendering: pixelated;
            box-shadow: 0 0 30px rgba(102,51,153,0.6);
        }
        #modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a140c; border: 6px double #bb99ff; padding: 20px; width: 420px; z-index: 100;
            box-shadow: 0 0 40px #ffaa33; color: #ffee77; font-size: 10px; text-align: center;
        }
        #modal button { margin: 8px; width: 40%; }
        #log {
            margin-top: 16px; background: rgba(10,8,20,0.95); border: 4px double #663399;
            padding: 12px; width: 780px; height: 110px; overflow-y: auto; font-size: 9px;
            color: #22ff66; box-shadow: 0 0 15px #ffaa33;
        }
        .scanline {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background: repeating-linear-gradient(transparent 0px, rgba(0,255,80,0.08) 1px, transparent 4px);
            animation: scan 3s linear infinite; z-index: 10; mix-blend-mode: overlay;
        }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(400%); } }
    </style>
</head>
<body>
    <h1>RECLAW PIXEL SIM — AGENT CELLS RPG FLOOR</h1>
    <div id="controls">
        <button onclick="updateBridge()">🔄 UPDATE BRIDGE</button>
        <button onclick="window.location.href='index.html'">← BACK TO DASHBOARD</button>
    </div>
    <div style="position:relative;">
        <canvas id="sim-canvas" width="800" height="520"></canvas>
        <div class="scanline"></div>
    </div>
    <div id="log">AGENT CELLS INITIALIZED (TikTok RPG style) — click any bordered cell for modal. Bridge pulls live handoffs from gateway.</div>

    <!-- RPG Approval Modal -->
    <div id="modal">
        <h2 id="modal-title" style="color:#ffcc44;margin-bottom:16px;">AGENT CELL</h2>
        <div id="modal-content" style="margin-bottom:20px;line-height:1.6;font-size:9px;color:#aaa;text-align:left;"></div>
        <button onclick="handleApproval('accept')">✅ ACCEPT</button>
        <button onclick="handleApproval('reject')">❌ REJECT</button>
        <button onclick="handleApproval('edit')">✏️ EDIT PROMPT</button>
        <button onclick="closeModal()" style="background:#442233;">CLOSE</button>
    </div>

    <script>
        // Reused from index.html + enhanced for RPG sim (vanilla canvas, no heavy systems)
        const canvas = document.getElementById('sim-canvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        let ws = null;
        const logEl = document.getElementById('log');
        let agents = []; // {id, x, y, sprite, state: 'idle', frame: 0, room}
        let tiles = []; // from castle_map or hardcoded
        const sprites = {};
        const TILE_SIZE = 155;
        const SPRITE_SIZE = 118;
        const GRID_OFFSET_X = 35;
        const GRID_OFFSET_Y = 35;

        // Hardcoded initial map based on castle_map.json (clear distinct "cells" like TikTok ref)
        function initMap() {
            tiles = [
                {x:0, y:0, name:'CLAWSMITH FORGE', color:'#443311', spriteKey:3, status: 'HAMMERING'},
                {x:1, y:0, name:'GRANT HALL', color:'#441133', spriteKey:2, status: 'WATCHING'},
                {x:0, y:1, name:'AUDIT CHAMBER', color:'#2a1f18', spriteKey:4, status: 'SCANNING'},
                {x:2, y:1, name:'CONTENT STUDIO', color:'#223311', spriteKey:2, status: 'EDITING'},
                {x:1, y:2, name:'RESEARCH LAB', color:'#1a1814', spriteKey:4, status: 'EXPANDING'}
            ];
            agents = [
                {id:'clawsmith', x: GRID_OFFSET_X + 0*TILE_SIZE + 20, y: GRID_OFFSET_Y + 0*TILE_SIZE + 18, spriteKey:3, state:'glowing', frame:0, room:'CLAWSMITH FORGE', cellIndex:0},
                {id:'grant-watcher', x: GRID_OFFSET_X + 1*TILE_SIZE + 20, y: GRID_OFFSET_Y + 0*TILE_SIZE + 18, spriteKey:2, state:'idle', frame:0, room:'GRANT HALL', cellIndex:1},
                {id:'auditor', x: GRID_OFFSET_X + 0*TILE_SIZE + 20, y: GRID_OFFSET_Y + 1*TILE_SIZE + 18, spriteKey:4, state:'scanning', frame:0, room:'AUDIT CHAMBER', cellIndex:2},
                {id:'creator', x: GRID_OFFSET_X + 2*TILE_SIZE + 20, y: GRID_OFFSET_Y + 1*TILE_SIZE + 18, spriteKey:2, state:'editing', frame:0, room:'CONTENT STUDIO', cellIndex:3}
            ];
        }

        // Preload sprites (from Imagine-generated pixel RPG ones)
        function preloadSprites() {
            const keys = [2,3,4];
            let loaded = 0;
            keys.forEach(k => {
                sprites[k] = new Image();
                sprites[k].src = `assets/sprites/${k}.jpg`;
                sprites[k].onload = () => { loaded++; if (loaded === keys.length) gameLoop(); };
            });
        }

        function log(msg) {
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            logEl.innerHTML += `<br>[${time}] ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
            if (logEl.children.length > 12) logEl.removeChild(logEl.children[0]);
        }

        function connectWS() {
            ws = new WebSocket('ws://127.0.0.1:18789');
            ws.onopen = () => log('✅ WS CONNECTED — RPG floor alive');
            ws.onmessage = (e) => {
                try {
                    const d = JSON.parse(e.data);
                    if (d.type === 'cell.update' || d.room) {
                        log(`📡 ${d.room || 'cell'} update: ${d.state || 'activity'}`);
                        // Update agents from real events (spriteAssetId mapping)
                        const agent = agents.find(a => a.room.toLowerCase().includes((d.room || '').toLowerCase()));
                        if (agent) {
                            agent.state = d.state || agent.state;
                            if (d.blueprint) agent.state = 'forging';
                        }
                    }
                } catch (err) { log('EVENT: ' + e.data); }
            };
            ws.onclose = () => { log('⚠ WS closed — refresh bridge'); setTimeout(connectWS, 4000); };
            ws.onerror = () => log('WS error — check gateway');
        }

        function draw() {
            // Clear with stone bg (retro RPG floor)
            ctx.fillStyle = '#1a140c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw distinct agent CELLS (grid of bounded rooms per TikTok ref - each agent in its own cell)
            tiles.forEach((tile, i) => {
                const px = GRID_OFFSET_X + tile.x * TILE_SIZE;
                const py = GRID_OFFSET_Y + tile.y * TILE_SIZE;
                // Cell background + thick RPG border
                ctx.fillStyle = tile.color;
                ctx.fillRect(px, py, TILE_SIZE-4, TILE_SIZE-4);
                ctx.strokeStyle = '#665533';
                ctx.lineWidth = 6;
                ctx.strokeRect(px, py, TILE_SIZE-4, TILE_SIZE-4);
                ctx.strokeStyle = '#bb99ff';
                ctx.lineWidth = 2;
                ctx.strokeRect(px+6, py+6, TILE_SIZE-16, TILE_SIZE-16);
                // Cell label (room name)
                ctx.fillStyle = '#ffee77';
                ctx.font = '9px "Press Start 2P"';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 4;
                ctx.fillText(tile.name.substring(0,11), px+12, py + 18);
                ctx.shadowBlur = 0;
                // Status per cell (like live agent cells)
                ctx.fillStyle = '#22ff99';
                ctx.font = '8px "Press Start 2P"';
                ctx.fillText(tile.status || 'ACTIVE', px+14, py + TILE_SIZE - 12);
            });

            // Draw hooded agents filling their cells (expanded per dashboard fix + TikTok cell style)
            agents.forEach((agent, i) => {
                const img = sprites[agent.spriteKey];
                if (!img) return;
                const cell = tiles[agent.cellIndex || i] || {x:0,y:0};
                const px = GRID_OFFSET_X + cell.x * TILE_SIZE + 18;
                const py = GRID_OFFSET_Y + cell.y * TILE_SIZE + 38;
                agent.x = px; agent.y = py; // sync position to cell
                // Full sprite (no crop - jpgs are full hooded scenes; scale to fill cell)
                ctx.drawImage(img, px, py, SPRITE_SIZE, SPRITE_SIZE);
                // State-based glow + simple animation bob
                const bob = (agent.state === 'glowing' || agent.state === 'forging') ? Math.sin(Date.now()/180)*3 : 0;
                if (agent.state === 'glowing' || agent.state === 'forging' || agent.state === 'scanning') {
                    ctx.shadowColor = '#bb99ff';
                    ctx.shadowBlur = 18;
                    ctx.fillStyle = 'rgba(187,153,255,0.35)';
                    ctx.fillRect(px+8, py+8 + bob, SPRITE_SIZE-16, SPRITE_SIZE-22);
                    ctx.shadowBlur = 0;
                }
                // Mini status indicator dot
                ctx.fillStyle = agent.state.includes('success') || agent.state === 'verified' ? '#22ff66' : '#ffcc44';
                ctx.fillRect(px + SPRITE_SIZE - 14, py + 12, 6, 6);
            });
        }

        let lastTime = 0;
        function gameLoop(time = 0) {
            if (time - lastTime > 16) {
                draw();
                lastTime = time;
            }
            requestAnimationFrame(gameLoop);
        }

        // Click handler for interactive RPG feel (cell/agent selection - distinct cells like TikTok)
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            // Grid-based cell hit detection (agents fill their cell)
            let hitCell = null;
            tiles.forEach((tile, i) => {
                const px = GRID_OFFSET_X + tile.x * TILE_SIZE;
                const py = GRID_OFFSET_Y + tile.y * TILE_SIZE;
                if (mx > px && mx < px + TILE_SIZE && my > py && my < py + TILE_SIZE) {
                    hitCell = i;
                }
            });
            if (hitCell !== null) {
                const agent = agents.find(a => a.cellIndex === hitCell) || agents[hitCell % agents.length];
                if (agent) showModal(agent);
            } else {
                log('🗺️ Clicked map edge — select an agent cell for approval modal');
            }
        });

        function showModal(agent) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-title').textContent = `${agent.room} — ${agent.id.toUpperCase()}`;
            document.getElementById('modal-content').innerHTML = `
                State: <span style="color:#ffcc44">${agent.state}</span><br>
                Hooded agent ready for command.<br><br>
                Approve next handoff? (ties to security gates)
            `;
            modal.style.display = 'block';
            window.currentAgent = agent; // for handleApproval
        }

        function handleApproval(action) {
            const agent = window.currentAgent;
            if (!agent) return;
            log(`🛡️ ${action.toUpperCase()} for ${agent.id} — sent across bridge (handoff JSON emitted)`);
            // Simulate send to gateway/agents (in real: WS send with approval)
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'approval', agent: agent.id, action, prompt: 'user_edited_if_any'}));
            }
            closeModal();
            // Trigger visual feedback
            agent.state = action === 'accept' ? 'success' : 'idle';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Manual bridge update (per user revision: poll for outputs on click)
        function updateBridge() {
            log('🔄 BRIDGE UPDATE — pulling pending handoffs/outputs from agents (auditor research, forges, etc.)');
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'bridge_poll', request: 'all_pending'}));
            }
            // Simulate new output
            if (agents[2]) agents[2].state = 'verified'; // auditor example
            log('📥 Received: Silent Auditor completed scan — ready for approval in modal.');
        }

        // Init
        window.onload = () => {
            initMap();
            preloadSprites();
            connectWS();
            log('🌟 PIXEL SIM LOADED — distinct AGENT CELLS (TikTok-style grid). Click any cell for RPG approval modal. UPDATE BRIDGE pulls real outputs.');
            // Initial sim activity (states update live per cell)
            setTimeout(() => { if (agents[0]) agents[0].state = 'forging'; }, 800);
            setTimeout(() => { if (agents[2]) agents[2].state = 'scanning'; log('📍 Auditor cell active — bridge ready for your inputs!'); }, 1800);
            setTimeout(() => { tiles.forEach(t => { if (t.status) t.status = t.status.includes('SCAN') ? 'VERIFIED' : t.status; }); }, 3500);
        };

        // Expose for modal
        window.handleApproval = handleApproval;
        window.closeModal = closeModal;
        window.updateBridge = updateBridge;
    </script>
</body>
</html>
