<!DOCTYPE html>
<html>
<head>
    <title>Bridge Test</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #status { font-size: 50px; font-weight: bold; text-align: center; }
        .open { color: #0f0; }
        .broken { color: #f00; }
    </style>
</head>
<body>
    <div id="status">Testing Bridge...</div>
    <script>
        const statusEl = document.getElementById('status');
        const ws = new WebSocket('ws://100.119.160.116:18789');
        ws.onopen = () => { statusEl.innerHTML = '<span class="open">✅ BRIDGE OPEN</span><br><small>The server is talking to your browser!</small>'; };
        ws.onerror = () => { statusEl.innerHTML = '<span class="broken">❌ BRIDGE BROKEN</span><br><small>The server is not responding on port 18789.</small>'; };
        setTimeout(() => { if(statusEl.innerText === 'Testing Bridge...') { statusEl.innerHTML = '<span class="broken">❌ TIMEOUT</span><br><small>The connection took too long.</small>'; } }, 5000);
    </script>
</body>
</html>
