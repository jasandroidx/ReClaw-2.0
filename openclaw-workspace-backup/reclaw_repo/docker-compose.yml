# ReClaw 2.0 — Hardened Production docker-compose (Hetzner GPU, Tailscale-only, persistent vault)
# Approved per current hardening plan. No destructive changes.
#
# Usage (run these yourself):
#   cd /opt/reclaw
#   docker compose config                  # validate
#   docker compose down && docker compose up -d --build
#   docker compose ps
#   curl -f http://127.0.0.1:8000/health
#   journalctl -u docker.service -n 50 --no-pager   # or docker compose logs
#
# Hardening added:
# - logging: json-file with rotation (prevents unbounded log growth)
# - ulimits: nofile for high-connection stability
# - Explicit restart: unless-stopped + healthcheck already present
# - Volume labels and comments clarified for /root/obsidian_vault (long-term memory)
# - Keeps Tailscale on host (systemd serve to 127.0.0.1:8000 inside container)
# - Non-root (uid 1000), resource limits, env_file from .env (Pydantic respected)
#
# This remains simple, cheap, 24/7 reliable. Logs go to Docker json + session.log inside data/sessions/.
# Obsidian vault at /root/obsidian_vault is the durable source of truth.


services:
  reclaw-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: reclaw:2.0
    container_name: reclaw-api
    user: "1000:1000"  # Matches Dockerfile reclaw uid/gid + host chown for vault/data
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RECLAW_ENV=prod
      - OBSIDIAN_VAULT_PATH=/vault  # Persistent host mount; writer uses /vault/Rural Data
    volumes:
      - ./data:/data:rw
      - ./outputs:/app/outputs:rw
      - /root/obsidian_vault:/vault:rw   # Primary persistent writable vault (Obsidian source of truth)
      # Future: add :ro to code if splitting agents into read-only workers
    ports:
      - "8000:8000"  # 0.0.0.0 on host (allows Tailscale IP 100.119.160.116 access); no public exposure via firewall/Tailscale-only serve
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # GPU for future Ollama/LLM claws (uncomment + nvidia toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Future "claws" (specialized agents for grant hunting, GBP scanning, video script gen, business automation).
  # Add as separate services with volume mounts limited to their session dirs for stronger isolation.
  # Example GPU service for local LLMs:
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: reclaw-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  # Visual dashboard MVP (Phase 2): static serve of dashboard/index.html (2D pixel floor, WS to gateway, Tailscale access on 8080)
  reclaw-dashboard:
    image: python:3.12-slim
    container_name: reclaw-dashboard
    restart: unless-stopped
    working_dir: /app
    command: python3 -m http.server 8080 --directory dashboard
    volumes:
      - .:/app:ro
    ports:
      - "8080:8080"  # Tailscale serve --bg --tcp 8080 tcp://127.0.0.1:8080 (or proxy via gateway)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
    # Non-root, low resources; GPU not needed for static 2D Canvas
  #   ports:
  #     - "127.0.0.1:11434:11434"

volumes:
  # Named volume for future Ollama (persistent models)
  ollama_data:
