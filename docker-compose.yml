version: "3.9"

services:
  reclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: reclaw
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - /c/Users/Jason/Obsidian/RuralData:/app/obsidian_vault
    networks:
      - reclaw-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G

  tailscale:
    image: tailscale/tailscale:latest
    container_name: reclaw-tailscale
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
    network_mode: service:reclaw
    cap_add:
      - net_admin
      - sys_module

networks:
  reclaw-net:
    driver: bridge

volumes:
  tailscale-state:
