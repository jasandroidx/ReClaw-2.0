# ReClaw 2.0 — Hardened Production docker-compose (Hetzner GPU, Tailscale-only, persistent vault)
# Approved per current hardening plan. No destructive changes.
#
# Usage (run these yourself):
#   cd /opt/reclaw
#   docker compose config                  # validate
#   docker compose down && docker compose up -d --build
#   docker compose ps
#   curl -f http://127.0.0.1:8000/health
#   journalctl -u docker.service -n 50 --no-pager   # or docker compose logs
#
# Hardening added:
# - logging: json-file with rotation (prevents unbounded log growth)
# - ulimits: nofile for high-connection stability
# - Explicit restart: unless-stopped + healthcheck already present
# - Volume labels and comments clarified for /root/obsidian_vault (long-term memory)
# - Keeps Tailscale on host (systemd serve to 127.0.0.1:8000 inside container)
# - Non-root (uid 1000), resource limits, env_file from .env (Pydantic respected)
#
# OLLAMA FIX (2026-06-11):
# - extra_hosts: host.docker.internal:host-gateway added to all services that need Ollama.
# - OLLAMA_BASE_URL env var set to http://host.docker.internal:11434 so OpenClaw/ReClaw
#   always finds Ollama on the host rather than looping back to the container itself.
# - Requires Ollama on host to be bound to 0.0.0.0:11434, not just 127.0.0.1.
#   To fix on host:  sudo systemctl edit ollama
#   Add:  [Service]
#         Environment=OLLAMA_HOST=0.0.0.0:11434
#   Then: sudo systemctl daemon-reload && sudo systemctl restart ollama
#
# This remains simple, cheap, 24/7 reliable. Logs go to Docker json + session.log inside data/sessions/.
# Obsidian vault at /root/obsidian_vault is the durable source of truth.


services:
  reclaw-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: reclaw:2.0
    container_name: reclaw-api
    user: "1000:1000"  # Matches Dockerfile reclaw uid/gid + host chown for vault/data
    restart: unless-stopped
    # === OLLAMA FIX: route host.docker.internal to host gateway so Ollama is reachable ===
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - RECLAW_ENV=prod
      - OBSIDIAN_VAULT_PATH=/vault
      # Ollama lives on HOST, not inside this container. Use this URL everywhere in ReClaw.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./data:/data:rw
      - ./outputs:/app/outputs:rw
      - /root/obsidian_vault:/vault:rw
    ports:
      - "8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # GPU for future Ollama/LLM claws (uncomment + nvidia toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Future "claws" (specialized agents for grant hunting, GBP scanning, video script gen, business automation).
  # Example GPU service for local Ollama (uncomment when GPU available):
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: reclaw-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  # Visual dashboard — static serve of dashboard/index.html
  # Includes live Ollama health panel polling http://host.docker.internal:11434
  reclaw-dashboard:
    image: python:3.12-slim
    container_name: reclaw-dashboard
    restart: unless-stopped
    working_dir: /app
    command: python3 -m http.server 8080 --directory dashboard
    # === OLLAMA FIX: dashboard JS can check Ollama status via same host gateway ===
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ollama_data:
