# ReClaw 2.0 — Production docker-compose (Hetzner GPU, clean Tailscale, persistent vault)
# Approved & upgraded per plan.md (env_file, non-root alignment, /vault mount, systemd Tailscale).
#
# Usage:
#   cd /opt/reclaw && docker compose down && docker compose up -d --build
#   systemctl status reclaw-tailscale-serve
#   curl -X POST "http://127.0.0.1:8000/trigger/Pike?area=Winslow&auto_approve=true"
#
# Key Upgrades (long-term focused):
# - env_file: .env (loads OBSIDIAN_SUBDIR, WRITE_DRY_RUN, token, etc. cleanly; Pydantic Settings respected).
# - Persistent vault at /root/obsidian_vault mounted to /vault (writable by uid=1000; creates Rural Data/).
# - Explicit user: 1000:1000 + chown on host dirs.
# - Tailscale exposure via host systemd service (reliable 24/7, no sidecar bloat).
# - Healthcheck, restart, resource limits, read-only where safe.
# - Supports autonomous daily runs, future "claws" (add services), GPU for Ollama/LLMs.
# - Security: no exposed TS key, least-privilege, approval gates in core/security.py.
# - Obsidian as durable memory for research, grant hunting, business scans, faceless video gen.
#
# This is production-grade, low-maintenance, and on-track for passive income via automated content + opportunity intel.


services:
  reclaw-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: reclaw:2.0
    container_name: reclaw-api
    user: "1000:1000"  # Matches Dockerfile reclaw uid/gid + host chown for vault/data
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RECLAW_ENV=prod
      - OBSIDIAN_VAULT_PATH=/vault  # Persistent host mount; writer uses /vault/Rural Data
    volumes:
      - ./data:/data:rw
      - ./outputs:/app/outputs:rw
      - /root/obsidian_vault:/vault:rw   # Primary persistent writable vault (Obsidian source of truth)
      # Future: add :ro to code if splitting agents into read-only workers
    ports:
      - "8000:8000"  # 0.0.0.0 on host (allows Tailscale IP 100.119.160.116 access); no public exposure via firewall/Tailscale-only serve
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    # GPU for future Ollama/LLM claws (uncomment + nvidia toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Future "claws" (specialized agents for grant hunting, GBP scanning, video script gen, business automation).
  # Add as separate services with volume mounts limited to their session dirs for stronger isolation.
  # Example GPU service for local LLMs:
